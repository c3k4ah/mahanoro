services:
  pocketbase:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mahanoro-pb
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb_data
      - ./backend/pb_migrations:/pb_migrations
      - ./backend/pb_hooks:/pb_hooks
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY:-}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mahanoro-front
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_PB_PROXY=http://pocketbase:8090
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - pocketbase
    restart: unless-stopped

volumes:
  pb_data:
