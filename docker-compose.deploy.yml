services:
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.deploy
    container_name: mahanoro-web
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - pocketbase
    restart: unless-stopped
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  pocketbase:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mahanoro-pb
    volumes:
      - pb_data:/pb_data
      - ./backend/pb_migrations:/pb_migrations
      - ./backend/pb_hooks:/pb_hooks
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY:-}
    restart: unless-stopped

volumes:
  pb_data:
  caddy_data:
  caddy_config:
